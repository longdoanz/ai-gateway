services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-gateway
    environment:
      - POSTGRES_USER=aigw
      - POSTGRES_PASSWORD=aigw_secret
      - POSTGRES_DB=ai-gateway
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aigw -d ai-gateway"]
      interval: 10s
      timeout: 5s
      retries: 5

  kiro-gateway-apikey:
    build:
      context: .
      dockerfile: Dockerfile.apikey
    image: kiro-gateway-apikey:latest
    container_name: kiro-gateway-apikey
    user: "1000:1000"
    ports:
      - "18000:18000"
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=18000
      - PROXY_API_KEY=${PROXY_API_KEY:-my-super-secret-password-123}
      - KIRO_REGION=${KIRO_REGION:-us-east-1}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DEBUG_MODE=${DEBUG_MODE:-off}
      - VPN_PROXY_URL=${VPN_PROXY_URL:-}
      - DATABASE_URL=postgresql+asyncpg://aigw:aigw_secret@postgres-gateway:5432/ai-gateway
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changemepwd}
      - NINE_ROUTER_URL=${NINE_ROUTER_URL:-http://ninerouter:20128}
      - NINE_ROUTER_API_KEY=${NINE_ROUTER_API_KEY:-}
      - NINE_ROUTER_PASSWORD=${NINE_ROUTER_PASSWORD:-123456}
      - OIDC_CLIENT_SECRET=${NINE_ROUTER_OIDC_CLIENT_SECRET}
      # Internal URL for JWT iss claim, token endpoint, and jwks (server-to-server)
      - OIDC_ISSUER_URL=${OIDC_ISSUER_URL:-http://kiro-gateway-apikey:18000}
      # Public URL returned as authorization_endpoint in OIDC discovery (browser redirect)
      - OIDC_PUBLIC_URL=${OIDC_PUBLIC_URL:-http://localhost:3002}
    env_file:
      - .env
    volumes:
      - ./debug_logs:/app/debug_logs
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:18000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

  ninerouter:
    build:
      context: .
      dockerfile: Dockerfile.ninerouter
    image: ninerouter:local
    container_name: ninerouter
    ports:
      - "20128:20128"
    environment:
      # BASE_URL must match the public origin the browser uses (same origin as webui)
      # so OIDC state cookies are set and read on the same domain
      - BASE_URL=http://localhost:3002/9router
      - OIDC_ISSUER_URL=http://kiro-gateway-apikey:18000
      - OIDC_CLIENT_ID=${NINE_ROUTER_OIDC_CLIENT_ID:-9router}
      - OIDC_CLIENT_SECRET=${NINE_ROUTER_OIDC_CLIENT_SECRET}
      - OIDC_SCOPES=openid profile email
      - AUTH_MODE=oidc
      - INITIAL_PASSWORD=${NINE_ROUTER_PASSWORD:-123456}
      - REQUIRE_API_KEY=${NINE_ROUTER_REQUIRE_API_KEY:-false}
      - API_KEY_SECRET=${NINE_ROUTER_API_KEY_SECRET:-}
    volumes:
      - ninerouter_data:/app/data
    depends_on:
      - kiro-gateway-apikey
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  webui:
    build:
      context: ./webui
      dockerfile: Dockerfile
      args:
        - API_URL=http://kiro-gateway-apikey:18000
        - NEXT_PUBLIC_NINE_ROUTER_ENABLED=${NINE_ROUTER_ENABLED:-true}
    ports:
      - "3002:3000"
    environment:
      - API_URL=http://kiro-gateway-apikey:18000
      - NEXT_PUBLIC_NINE_ROUTER_ENABLED=${NINE_ROUTER_ENABLED:-true}
    depends_on:
      - kiro-gateway-apikey
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

volumes:
  ninerouter_data:
  postgres_data:

networks:
  default:
    name: kiro-gateway-network
    driver: bridge
