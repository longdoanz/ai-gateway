services:
  kiro-gateway-apikey:
    build:
      context: .
      dockerfile: Dockerfile.apikey
    image: kiro-gateway-apikey:latest
    container_name: kiro-gateway-apikey
    user: "1000:1000"
    ports:
      - "18001:8000"
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000
      - PROXY_API_KEY=${PROXY_API_KEY:-my-super-secret-password-123}
      - KIRO_REGION=${KIRO_REGION:-us-east-1}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DEBUG_MODE=${DEBUG_MODE:-off}
      - VPN_PROXY_URL=${VPN_PROXY_URL:-}
    env_file:
      - .env
    volumes:
      - ./debug_logs:/app/debug_logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

networks:
  default:
    name: kiro-gateway-network
