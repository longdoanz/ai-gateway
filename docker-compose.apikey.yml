services:
  kiro-gateway-apikey:
    build:
      context: .
      dockerfile: Dockerfile.apikey
    image: kiro-gateway-apikey:latest
    container_name: kiro-gateway-apikey
    user: "1000:1000"
    ports:
      - "18000:18000"
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=18000
      - PROXY_API_KEY=${PROXY_API_KEY:-my-super-secret-password-123}
      - KIRO_REGION=${KIRO_REGION:-us-east-1}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DEBUG_MODE=${DEBUG_MODE:-off}
      - VPN_PROXY_URL=${VPN_PROXY_URL:-}
      - DATABASE_URL=postgresql+asyncpg://aigw:aigw_secret@postgres-18:5432/ai-gateway
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changemepwd}
      - NINE_ROUTER_URL=${NINE_ROUTER_URL:-http://ninerouter:20128}
      - NINE_ROUTER_API_KEY=${NINE_ROUTER_API_KEY:-}
      - OIDC_CLIENT_SECRET=${NINE_ROUTER_OIDC_CLIENT_SECRET}
      - OIDC_ISSUER_URL=${OIDC_ISSUER_URL:-http://kiro-gateway-apikey:18000}
    env_file:
      - .env
    volumes:
      - ./debug_logs:/app/debug_logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:18000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

  ninerouter:
    image: decolua/9router:latest
    container_name: ninerouter
    # No ports exposed — only reachable via ai-gateway proxy at /9router/
    environment:
      - BASE_URL=http://localhost:18000/9router
      - OIDC_ISSUER_URL=http://kiro-gateway-apikey:18000
      - OIDC_CLIENT_ID=${NINE_ROUTER_OIDC_CLIENT_ID:-9router}
      - OIDC_CLIENT_SECRET=${NINE_ROUTER_OIDC_CLIENT_SECRET}
      - OIDC_SCOPES=openid profile email
      - AUTH_MODE=oidc
      - REQUIRE_API_KEY=${NINE_ROUTER_REQUIRE_API_KEY:-false}
      - API_KEY_SECRET=${NINE_ROUTER_API_KEY_SECRET:-}
    volumes:
      - ninerouter_data:/app/data
    depends_on:
      - kiro-gateway-apikey
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  webui:
    build:
      context: ./webui
      dockerfile: Dockerfile
      args:
        - API_URL=http://kiro-gateway-apikey:18000
    ports:
      - "3001:3000"
    environment:
      - API_URL=http://kiro-gateway-apikey:18000
      - NEXT_PUBLIC_NINE_ROUTER_ENABLED=${NINE_ROUTER_ENABLED:-true}
    depends_on:
      - kiro-gateway-apikey
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

volumes:
  ninerouter_data:

networks:
  default:
    name: kiro-gateway-network
    external: true
